# Datlas — SDD Configuration
# Generated: 2026-06-06

project:
  name: datlas
  description: |
    Web app para limpieza, análisis y exploración de datasets CSV.
    Portfolio project orientado a búsqueda laboral Backend Python Jr / Data Engineer Jr.

language: python
frameworks:
  - fastapi
  - astro
  - pandas

# ── Testing ──────────────────────────────────────────────
testing:
  strict_tdd: false
  backend:
    command: cd backend && python -m pytest tests/ -v --tb=short --cov=app/ --cov-report=term-missing
  frontend:
    command: cd frontend && npm run build

# ── CI/CD ────────────────────────────────────────────────
ci:
  provider: github-actions
  workflows:
    - .github/workflows/ci.yml       # lint + test + frontend build
    - .github/workflows/deploy.yml   # GitHub Pages (frontend)

# ── Deploy ───────────────────────────────────────────────
deploy:
  frontend:
    platform: github-pages
    url: https://leandrobenjaminl.github.io/datlas
  backend:
    platform: render
    blueprint: render.yaml
    url: https://datlas-api.onrender.com  # TBC

# ── Architecture ─────────────────────────────────────────
architecture:
  backend: backend/           # FastAPI + Pandas + PostgreSQL
  frontend: frontend/         # Astro 6 static site
  data_pipeline:
    - upload   (CSV → Pandas)
    - clean    (outliers, nulls, duplicates)
    - explore  (metadata summary)
  docker:
    compose: docker-compose.yml   # dev only (API + PG + pgAdmin)
    prod: backend/Dockerfile      # Render production image

# ── SDD Preferences (session preflight) ──────────────────
sdd:
  mode: interactive
  artifact_store:
    - openspec
    - engram
  pr_strategy: single-pr-default
  review_budget_lines: 400
