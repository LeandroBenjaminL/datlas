# ============================================
# Datlas — Docker Compose
# ============================================
# Levanta: FastAPI + PostgreSQL + pgAdmin
#
# Uso:
#   cp .env.example .env
#   docker compose up --build
#
# Servicios:
#   API:        http://localhost:8000
#   API Docs:   http://localhost:8000/docs
#   pgAdmin:    http://localhost:5050
#   PostgreSQL: localhost:5432

services:
  # ── Backend: FastAPI + Pandas ──
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: datlas-api
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./backend:/app # código live-reload en dev
      - ./data:/app/data # datasets compartidos
    env_file:
      - .env
    environment:
      # Override para docker-compose: el host de la DB es el nombre del servicio
      - POSTGRES_HOST=db
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Base de Datos: PostgreSQL 16 ──
  db:
    image: postgres:16-alpine
    container_name: datlas-db
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-datlas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-datlas_secreto_2026}
      POSTGRES_DB: ${POSTGRES_DB:-datlas_db}
    volumes:
      - pgdata:/var/lib/postgresql/data # datos persistentes
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-datlas} -d ${POSTGRES_DB:-datlas_db}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Interfaz Visual: pgAdmin ──
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: datlas-pgadmin
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@datlas.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - db
    restart: unless-stopped

  # ── Frontend: Astro (Nginx) ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: datlas-frontend
    ports:
      - "${FRONTEND_PORT:-4321}:4321"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
  pgadmin_data:
