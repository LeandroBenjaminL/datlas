name: CI — datlas

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  review-budget:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Check PR size against review budget
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Check for override label
          LABELS=$(gh pr view $PR_NUMBER --json labels --jq '.labels[].name')
          if echo "$LABELS" | grep -q 'override-review-budget'; then
            echo "✅ Label 'override-review-budget' found — budget check bypassed."
            exit 0
          fi

          # Get additions and deletions
          DIFF=$(gh pr view $PR_NUMBER --json additions,deletions)
          ADDITIONS=$(echo "$DIFF" | jq '.additions')
          DELETIONS=$(echo "$DIFF" | jq '.deletions')
          TOTAL=$((ADDITIONS + DELETIONS))
          BUDGET=400

          echo "Additions: $ADDITIONS"
          echo "Deletions: $DELETIONS"
          echo "Total changed lines: $TOTAL"
          echo "Budget: $BUDGET"

          if [ "$TOTAL" -gt "$BUDGET" ]; then
            echo ""
            echo "❌ PR exceeds the review budget of $BUDGET lines (changed: $TOTAL)."
            echo ""
            echo "   To fix:"
            echo "   1. Split this PR into smaller, focused PRs (< $BUDGET lines each)."
            echo "   2. Or add the 'override-review-budget' label if a larger PR is justified."
            echo ""
            exit 1
          fi

          echo "✅ PR size ($TOTAL lines) is within the $BUDGET-line budget."

  security:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt bandit
      - name: Bandit SAST
        run: bandit -c .bandit -r app/ -f json -o bandit-results.json || true
      - name: Upload bandit results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: bandit-results
          path: backend/bandit-results.json

  lint-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt ruff
      - run: ruff check app/ tests/
      - run: ruff format --check app/ tests/

  test-backend:
    needs: lint-backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt pytest pytest-cov pytest-asyncio hypothesis
      - run: python -m pytest tests/ -v --tb=short --cov=app/ --cov-report=term-missing -x

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm install -g npm@11
      - run: npm ci
      - run: npm run build
